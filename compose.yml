name: "monitoring"

x-lockdown: &lockdown
  # prevents write access to the image itself
  read_only: true
  # prevents any process within the container to gain more privileges
  security_opt:
    - "no-new-privileges=true"

services:
  prometheus:
    depends_on:
      adguard:
        condition: "service_healthy"
        restart: true
    image: "11notes/prometheus:3.11.3"
    <<: *lockdown
    environment:
      TZ: "Europe/Zurich"
      PROMETHEUS_CONFIG: |-
        global:
          scrape_interval: 1s

        scrape_configs:
          - job_name: "dnspyre"
            static_configs:
              - targets: ["dnspyre:3000"]
    volumes:
      - "prometheus.etc:/prometheus/etc"
      - "prometheus.var:/prometheus/var"
    ports:
      - "3000:9090/tcp"
    networks:
      frontend:
    restart: "always"

  dnspyre:
    # for more information about this image checkout:
    # https://github.com/11notes/docker-distroless
    #
    # this image will execute 100k (10 x 10000) queries
    # against adguard to fill your Prometheus with some data
    depends_on:
      prometheus:
        condition: "service_healthy"
        restart: true
    image: "11notes/distroless:dnspyre"
    <<: *lockdown
    command: "--server adguard -c 10 -n 3 -t A --prometheus ':3000' https://raw.githubusercontent.com/11notes/static/refs/heads/master/src/benchmarks/dns/fqdn/10000"
    environment:
      TZ: "Europe/Zurich"
    networks:
      frontend:

  adguard:
    # for more information about this image checkout:
    # https://github.com/11notes/docker-adguard
    image: "11notes/adguard:0.107.64"
    <<: *lockdown
    environment:
      TZ: "Europe/Zurich"
    volumes:
      - "adguard.etc:/adguard/etc"
      - "adguard.var:/adguard/var"
    tmpfs:
      - "/adguard/run:uid=1000,gid=1000"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "3010:3000/tcp"
    networks:
      frontend:
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 53
    restart: "always"

volumes:
  prometheus.etc:
  prometheus.var:
  adguard.etc:
  adguard.var:

networks:
  frontend: